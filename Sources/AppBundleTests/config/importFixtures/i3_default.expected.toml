# Generated by 'import-config i3'
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# i3 doesn't flatten nested containers; disabled so the imported 'split' bindings work
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

after-startup-command = [
    'exec-and-forget dex --autostart --environment i3',
    'exec-and-forget xss-lock --transfer-sleep-lock -- i3lock --nofork',
    'exec-and-forget nm-applet',
]

tiling-policy = 'manual'

[mode.main.binding]
alt-enter = 'exec-and-forget i3-sensible-terminal'
alt-shift-q = 'close'
alt-d = 'exec-and-forget dmenu_run'
alt-j = 'focus left'
alt-k = 'focus down'
alt-l = 'focus up'
alt-semicolon = 'focus right'
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'
alt-shift-j = 'move left'
alt-shift-k = 'move down'
alt-shift-l = 'move up'
alt-shift-semicolon = 'move right'
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'
alt-h = 'split horizontal'
alt-v = 'split vertical'
alt-f = 'fullscreen'
alt-s = 'layout accordion'
alt-w = 'layout accordion'
alt-e = 'layout tiles horizontal vertical'
alt-shift-space = 'layout floating tiling'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-c = 'reload-config'
alt-shift-r = 'reload-config'
alt-shift-e = "exec-and-forget \"i3-nagbar -t warning -m 'Exit i3?' -B 'Yes' 'i3-msg exit'\""
alt-r = 'mode resize'

[mode.resize.binding]
j = 'resize width -10%'
k = 'resize height +10%'
l = 'resize height -10%'
semicolon = 'resize width +10%'
left = 'resize width -10%'
down = 'resize height +10%'
up = 'resize height -10%'
right = 'resize width +10%'
enter = 'mode main'
esc = 'mode main'
alt-r = 'mode main'

