# Generated by 'import-config i3'
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

after-startup-command = [
    'exec-and-forget picom -b',
]

focus-follows-mouse.enabled = true
default-root-container-layout = 'accordion'
tiling-policy = 'manual'

[gaps]
inner.vertical = 10
inner.horizontal = 10
outer.left = 4
outer.bottom = 4
outer.top = 30
outer.right = 4

[workspace-to-monitor-force-assignment]
'1:www' = 'DP-1'
'2:code' = 'main'

[[window-detection-rules]]
if.app-id = 'net.kovidgoyal.kitty'
if.window-title-regex-substring = 'scratch'
treat-as = 'float'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = "move-node-to-workspace '1:www'"

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
if.window-title-regex-substring = 'scratch'
run = ['resize width 1200', 'resize height 800']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'sticky on'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 4'

[mode.main.binding]
cmd-enter = 'exec-and-forget kitty'
alt-tab = 'workspace-back-and-forth'
cmd-minus = 'resize width -50'
cmd-equal = 'resize width +50'
cmd-p = 'sticky'
cmd-m = 'move-workspace-to-monitor right'
cmd-n = 'move-node-to-monitor next'
cmd-c = 'center-window'
cmd-g = ['fullscreen', 'layout floating tiling']

