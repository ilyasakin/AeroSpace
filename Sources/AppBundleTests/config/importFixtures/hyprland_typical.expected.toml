# Generated by 'import-config hyprland'
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

after-startup-command = [
    'exec-and-forget waybar & hyprpaper',
    'exec-and-forget nm-applet',
]

tiling-policy = 'dwindle'

[gaps]
inner.vertical = 5
inner.horizontal = 5
outer.left = 12
outer.bottom = 12
outer.top = 12
outer.right = 12

[workspace-to-monitor-force-assignment]
1 = 'DP-1'

[[window-detection-rules]]
if.app-id = 'com.apple.systempreferences'
treat-as = 'float'

[[window-detection-rules]]
if.app-id = 'net.kovidgoyal.kitty'
if.window-title-regex-substring = '^(scratch)$'
treat-as = 'float'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'io.mpv'
run = ['layout floating', 'sticky on']

[mode.main.binding]
alt-q = 'exec-and-forget kitty'
alt-c = 'close'
alt-v = 'layout floating tiling'
alt-r = 'exec-and-forget wofi --show drun'
alt-p = 'sticky'
alt-f = 'fullscreen'
alt-left = 'focus left'
alt-right = 'focus right'
alt-up = 'focus up'
alt-down = 'focus down'
alt-shift-left = 'move left'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-esc = 'workspace-back-and-forth'
alt-ctrl-right = 'resize width +30'
alt-ctrl-down = 'resize height -30'
alt-w = 'mode resize'

[mode.resize.binding]
right = 'resize width +10'
esc = 'mode main'

